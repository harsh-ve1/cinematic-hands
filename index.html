<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satoru Gojo - The Honored One (Upgraded)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }

        /* Screen Shake Animation */
        @keyframes intense-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-5px, -5px) rotate(-1deg); }
            20% { transform: translate(5px, 5px) rotate(1deg); }
            30% { transform: translate(-5px, 5px) rotate(-1deg); }
            40% { transform: translate(5px, -5px) rotate(1deg); }
            50% { transform: translate(-5px, -5px) rotate(-1deg); }
            60% { transform: translate(5px, 5px) rotate(1deg); }
            70% { transform: translate(-5px, 5px) rotate(-1deg); }
            80% { transform: translate(5px, -5px) rotate(1deg); }
            90% { transform: translate(-5px, -5px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shaking {
            animation: intense-shake 0.15s infinite;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Cinematic HUD & Controls */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-box h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 150, 255, 0.7);
            color: #e0f2fe;
        }

        .title-box p {
            font-size: 0.85rem;
            color: #00d2ff;
            letter-spacing: 2px;
        }

        .six-eyes-hud {
            background: rgba(0, 20, 40, 0.4);
            border: 1px solid #00d2ff;
            padding: 15px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
            font-family: monospace;
            font-size: 0.8rem;
            color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
            transition: all 0.3s;
        }

        .six-eyes-hud.active {
            border-color: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
            color: #fff;
        }

        /* Center Gesture Overlay */
        .gesture-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            text-align: center;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 5;
        }

        .gesture-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .gesture-emoji {
            font-size: 6rem;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.8));
            animation: pulse 1.5s infinite alternate;
        }

        .technique-name {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 15px;
            text-shadow: 0 0 20px #000;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Bottom Controls Layout */
        .controls-panel {
            pointer-events: auto;
            display: flex;
            gap: 15px;
            justify-content: center;
            background: rgba(5, 5, 10, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            align-self: center;
            margin-bottom: 10px;
        }

        .btn {
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.3);
            color: #8ab4f8;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: #00d2ff;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-blue:hover { border-color: #0066ff; box-shadow: 0 0 15px rgba(0,102,255,0.6); color: #66a3ff; }
        .btn-red:hover { border-color: #ff3333; box-shadow: 0 0 15px rgba(255,51,51,0.6); color: #ff9999; }
        .btn-purple:hover { border-color: #9933ff; box-shadow: 0 0 15px rgba(153,51,255,0.6); color: #cc99ff; }
        .btn-domain {
            background: linear-gradient(45deg, #111, #001530);
            border: 1px solid #ffffff;
            color: #fff;
            font-weight: bold;
        }
        .btn-domain:hover {
            background: linear-gradient(45deg, #000, #222);
            border-color: #00d2ff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body id="main-body">

    <canvas id="canvas"></canvas>

    <div class="ui-container">
        <!-- Header HUD -->
        <div class="header">
            <div class="title-box">
                <h1>Satoru Gojo</h1>
                <p>Status: Limitless Active</p>
            </div>
            <div class="six-eyes-hud" id="six-eyes-hud">
                <div>[SIX EYES ARCHITECTURE]</div>
                <div>CE Output: Max Optimized</div>
                <div>Atomic Scan: <span id="hud-scan">READY</span></div>
                <div>Target Lock: <span id="hud-target">AUTO</span></div>
            </div>
        </div>

        <!-- Middle Quick Instructions / Status -->
        <div class="gesture-overlay" id="gesture-overlay">
            <div class="gesture-emoji" id="gesture-emoji">🤞</div>
            <div class="technique-name" id="technique-text">Unlimited Void</div>
        </div>

        <!-- Controls Dashboard -->
        <div class="controls-panel">
            <button class="btn btn-blue" onclick="triggerTechnique('blue')">Cursed Technique: Blue</button>
            <button class="btn btn-red" onclick="triggerTechnique('red')">Reversal: Red</button>
            <button class="btn btn-purple" onclick="triggerTechnique('purple')">Hollow: Purple</button>
            <button class="btn btn-domain" onclick="triggerDomain()">Domain Expansion</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const body = document.getElementById('main-body');
        const hudScan = document.getElementById('hud-scan');
        const sixEyesHud = document.getElementById('six-eyes-hud');
        const gestureOverlay = document.getElementById('gesture-overlay');
        const gestureEmoji = document.getElementById('gesture-emoji');
        const techniqueText = document.getElementById('technique-text');

        // Resize handler
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Mouse tracking for Aura and Six Eyes
        let mouse = { x: canvas.width / 2, y: canvas.height / 2, targetX: canvas.width / 2, targetY: canvas.height / 2 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Synthetic Audio Engine (Binaural & Pure Waves for Sci-fi Feel)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'blue') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'red') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'purple') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(40, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.8);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            } else if (type === 'domain') {
                // Heavy deep ambient bass drop
                osc.type = 'sine';
                osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(25, audioCtx.currentTime + 2);
                gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
                osc.start(); osc.stop(audioCtx.currentTime + 2.5);
            }
        }

        // Particle Configuration
        let particles = [];
        let currentMode = 'normal'; // normal, domain
        let activeImpacts = [];

        class Particle {
            constructor(x, y, colorType) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.baseSpeedX = (Math.random() - 0.5) * 2;
                this.baseSpeedY = (Math.random() - 0.5) * 2;
                this.speedX = this.baseSpeedX;
                this.speedY = this.baseSpeedY;
                this.colorType = colorType; // blue, red, purple, white
                this.alpha = 1;
                this.life = Math.random() * 60 + 40;
            }

            update() {
                // If Blue Technique is active, attract particles to center
                if (activeImpacts.some(i => i.type === 'blue')) {
                    let impact = activeImpacts.find(i => i.type === 'blue');
                    let dx = impact.x - this.x;
                    let dy = impact.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > 5) {
                        this.speedX += (dx / dist) * 0.4;
                        this.speedY += (dy / dist) * 0.4;
                    }
                } 
                // If Red is active, repel violently
                else if (activeImpacts.some(i => i.type === 'red')) {
                    let impact = activeImpacts.find(i => i.type === 'red');
                    let dx = this.x - impact.x;
                    let dy = this.y - impact.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < impact.radius + 100) {
                        this.speedX += (dx / (dist+1)) * 0.8;
                        this.speedY += (dy / (dist+1)) * 0.8;
                    }
                }

                this.x += this.speedX;
                this.y += this.speedY;
                
                // Slow down drag
                this.speedX *= 0.96;
                this.speedY *= 0.96;

                this.life--;
                this.alpha = this.life / 100;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                if (this.colorType === 'blue') {
                    ctx.fillStyle = '#00d2ff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#0066ff';
                } else if (this.colorType === 'red') {
                    ctx.fillStyle = '#ff3333';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff0000';
                } else if (this.colorType === 'purple') {
                    ctx.fillStyle = '#df80ff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#9933ff';
                } else {
                    ctx.fillStyle = '#ffffff';
                }
                
                ctx.fill();
                ctx.restore();
            }
        }

        // Trigger Screen Shaking
        function startScreenShake(duration) {
            body.classList.add('shaking');
            setTimeout(() => {
                body.classList.remove('shaking');
            }, duration);
        }

        // Orchestrate JJK Techniques
        function triggerTechnique(tech) {
            playSound(tech);
            startScreenShake(tech === 'purple' ? 600 : 300);
            
            // UI Visual Feedback
            gestureOverlay.classList.add('show');
            if(tech === 'blue') {
                gestureEmoji.innerText = '🫵';
                techniqueText.innerText = 'Lapse: Blue';
                techniqueText.style.color = '#00d2ff';
                techniqueText.style.textShadow = '0 0 20px #0066ff';
            } else if(tech === 'red') {
                gestureEmoji.innerText = '☝️';
                techniqueText.innerText = 'Reversal: Red';
                techniqueText.style.color = '#ff3333';
                techniqueText.style.textShadow = '0 0 20px #ff0000';
            } else if(tech === 'purple') {
                gestureEmoji.innerText = '🫸💥🫷';
                techniqueText.innerText = 'Hollow: Purple';
                techniqueText.style.color = '#df80ff';
                techniqueText.style.textShadow = '0 0 25px #9933ff';
            }

            setTimeout(() => gestureOverlay.classList.remove('show'), 1200);

            // Add energy shockwaves to canvas
            activeImpacts.push({
                x: canvas.width / 2 + (Math.random() - 0.5) * 100,
                y: canvas.height / 2 + (Math.random() - 0.5) * 100,
                radius: 10,
                maxRadius: tech === 'purple' ? 350 : 180,
                type: tech,
                duration: tech === 'purple' ? 60 : 40
            });

            // Burst particles
            for (let i = 0; i < 150; i++) {
                let p = new Particle(canvas.width/2, canvas.height/2, tech);
                p.speedX = (Math.random() - 0.5) * 15;
                p.speedY = (Math.random() - 0.5) * 15;
                particles.push(p);
            }
        }

        function triggerDomain() {
            playSound('domain');
            startScreenShake(1500);
            currentMode = 'domain';
            sixEyesHud.classList.add('active');
            hudScan.innerText = 'INFINITE ANALYSIS...';

            gestureEmoji.innerText = '🤞';
            techniqueText.innerText = 'Unlimited Void';
            techniqueText.style.color = '#ffffff';
            techniqueText.style.textShadow = '0 0 30px #ffffff';
            gestureOverlay.classList.add('show');

            setTimeout(() => {
                gestureOverlay.classList.remove('show');
            }, 2000);

            setTimeout(() => {
                currentMode = 'normal';
                sixEyesHud.classList.remove('active');
                hudScan.innerText = 'READY';
            }, 6000);
        }

        // Continuous Loop Animation Engine
        let frame = 0;
        function animate() {
            frame++;
            
            // Background Selection
            if (currentMode === 'domain') {
                // Unlimited Void space simulation
                ctx.fillStyle = 'rgba(2, 1, 6, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Infinite warp lines
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.beginPath();
                for(let i=0; i < canvas.width; i+=40) {
                    ctx.moveTo(i, 0);
                    ctx.lineTo(canvas.width/2 + Math.sin(frame*0.01)*50, canvas.height/2);
                    ctx.lineTo(i, canvas.height);
                }
                ctx.stroke();

                // Abstract cosmic gate center
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, Math.abs(Math.sin(frame * 0.02)) * 80 + 20, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.fill();
            } else {
                // Standard mode background clean
                ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Smooth mouse transition
            mouse.targetX += (mouse.x - mouse.targetX) * 0.1;
            mouse.targetY += (mouse.y - mouse.targetY) * 0.1;

            // Generate Default Blue Cursed Aura around user mouse
            if (frame % 2 === 0 && currentMode === 'normal') {
                particles.push(new Particle(mouse.targetX, mouse.targetY, 'blue'));
                if (Math.random() > 0.85) {
                    particles.push(new Particle(mouse.targetX, mouse.targetY, 'white'));
                }
            }

            // Process dynamic impacts/shockwaves
            activeImpacts.forEach((impact, idx) => {
                impact.radius += (impact.maxRadius - impact.radius) * 0.1;
                impact.duration--;

                ctx.save();
                ctx.beginPath();
                ctx.arc(impact.x, impact.y, impact.radius, 0, Math.PI * 2);
                
                if (impact.type === 'blue') {
                    ctx.strokeStyle = `rgba(0, 210, 255, ${impact.duration/40})`;
                    ctx.lineWidth = 4;
                } else if (impact.type === 'red') {
                    ctx.strokeStyle = `rgba(255, 51, 51, ${impact.duration/40})`;
                    ctx.lineWidth = 6;
                } else if (impact.type === 'purple') {
                    ctx.strokeStyle = `rgba(153, 51, 255, ${impact.duration/60})`;
                    ctx.lineWidth = 12;
                    ctx.fillStyle = `rgba(153, 51, 255, ${(impact.duration/60)*0.15})`;
                    ctx.fill();
                }
                ctx.stroke();
                ctx.restore();

                if (impact.duration <= 0) activeImpacts.splice(idx, 1);
            });

            // Process and update particle arrays
            particles.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(idx, 1);
            });

            // Six Eyes UI Targeting Reticle Logic
            if (currentMode === 'domain' || Math.random() > 0.4) {
                ctx.save();
                ctx.strokeStyle = currentMode === 'domain' ? 'rgba(255,255,255,0.4)' : 'rgba(0, 210, 255, 0.3)';
                ctx.lineWidth = 1;
                
                // Main tracking grid intersection
                ctx.beginPath();
                ctx.arc(mouse.targetX, mouse.targetY, 40, 0, Math.PI * 2);
                ctx.moveTo(mouse.targetX - 60, mouse.targetY); ctx.lineTo(mouse.targetX + 60, mouse.targetY);
                ctx.moveTo(mouse.targetX, mouse.targetY - 60); ctx.lineTo(mouse.targetX, mouse.targetY + 60);
                ctx.stroke();

                // Live analytical text data near crosshair
                ctx.fillStyle = currentMode === 'domain' ? '#ffffff' : '#00d2ff';
                ctx.font = '10px monospace';
                ctx.fillText(`INF_GAP: ${(Math.random() * 0.0001).toFixed(6)}mm`, mouse.targetX + 70, mouse.targetY - 10);
                ctx.fillText(`CE_FLOW: DETECTED`, mouse.targetX + 70, mouse.targetY + 10);
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        // Start engine
        animate();
    </script>
</body>
</html>
