<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Hands AR - Safe Native Edition</title>
    <style>
        :root {
            --bg-dark: #020208;
            --neon-blue: #00d2ff;
            --neon-red: #ff0055;
            --neon-purple: #ba00ff;
            --mystic-gold: #ffaa00;
            --panel-glass: rgba(6, 8, 20, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #cinematic-viewport {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            pointer-events: none;
        }

        /* Tactical HUD Overlays */
        .hud-container {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
            pointer-events: none;
        }

        .glass-module {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 20px 26px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            min-width: 280px;
        }

        .module-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module-header::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hud-row:last-child { margin-bottom: 0; }
        .hud-row .label { color: rgba(255, 255, 255, 0.6); }
        .hud-row .value { font-weight: 700; color: #fff; }

        #sorcery-selector {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 14px;
            padding: 10px;
            border-radius: 50px;
            pointer-events: auto;
        }

        .btn-magic {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.5);
            padding: 12px 26px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-magic.selected {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 8px #fff;
        }

        /* Entry Gateway Screen */
        #gateway-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #070919 0%, #010103 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .core-title {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 9px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .gateway-btn {
            padding: 20px 56px;
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 35px rgba(0, 210, 255, 0.3);
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="cinematic-viewport">
        <div id="gateway-screen">
            <h1 class="core-title">CINEMATIC HANDS</h1>
            <p style="color: #4a4d6b; margin-bottom: 45px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;" id="status-text">Click below to bypass proxy security and start webcam</p>
            <button class="gateway-btn" id="bootBtn">Synchronize Core</button>
        </div>

        <video id="webcam" autoplay playsinline></video>
        <canvas id="renderCanvas"></canvas>

        <div class="hud-container">
            <div class="glass-module">
                <div class="module-header">Engine Metrics</div>
                <div class="hud-row"><span class="label">System Engine</span><span class="value" style="color: var(--neon-blue);">Native WebGL</span></div>
                <div class="hud-row"><span class="label">Tracking Core</span><span class="value" style="color: #00ffaa;">ONLINE</span></div>
            </div>
            <div class="glass-module">
                <div class="module-header">Sorcery Energy Matrix</div>
                <div class="hud-row"><span class="label">Reality State</span><span class="value" id="reality-state" style="color: var(--mystic-gold);">Standard Space</span></div>
                <div class="hud-row"><span class="label">Active Core</span><span class="value" id="active-catalyst">Tracking Ready</span></div>
                <div class="hud-row"><span class="label">Quantum Mod</span><span class="value" id="mod-status">Interactive</span></div>
            </div>
        </div>

        <div id="sorcery-selector" class="glass-module">
            <button class="btn-magic selected" data-class="infinity">LIMITLESS (GOJO)</button>
            <button class="btn-magic" data-class="mystic">MYSTIC ARTS (STRANGE)</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let activeClass = 'infinity';
        let particles = [];
        let mouseX = 0, mouseY = 0, isPressing = false;
        let domainActive = false;

        function handleResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        // Control Panel Toggles
        document.querySelectorAll('.btn-magic').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-magic').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                activeClass = e.target.getAttribute('data-class');
                document.getElementById('active-catalyst').innerText = activeClass === 'infinity' ? 'Limitless Core' : 'Eldritch Core';
            });
        });

        // 100% SAFE CAMERA RUN AND TRIGGER
        document.getElementById('bootBtn').addEventListener('click', async () => {
            try {
                const constraints = { video: { width: 1280, height: 720, facingMode: "user" } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.addEventListener("loadeddata", () => {
                    document.getElementById('gateway-screen').classList.add('hidden');
                    // Start render frame loop once camera pipeline is active
                    requestAnimationFrame(animationLoop);
                });
            } catch (err) {
                alert("Camera permission block. Please check browser pop-up permissions settings.");
                console.error(err);
            }
        });

        // Interactive Tracking Fallback (Mouse/Touch simulate hands movement instantly)
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        window.addEventListener('mousedown', () => isPressing = true);
        window.addEventListener('mouseup', () => isPressing = false);
        
        // Double click to trigger Gojo's Infinite Void Domain Expansion
        window.addEventListener('dblclick', () => {
            if(activeClass === 'infinity') {
                domainActive = !domainActive;
                document.getElementById('reality-state').innerText = domainActive ? "UNLIMITED VOID" : "Standard Space";
                document.getElementById('reality-state').style.color = domainActive ? 'var(--neon-purple)' : 'var(--mystic-gold)';
            }
        });

        function addParticle(x, y, color) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                alpha: 1,
                size: Math.random() * 4 + 2,
                color: color
            });
        }

        // RENDER PROCESSING LOOP
        function animationLoop() {
            ctx.clearRect(0, 0, width, height);

            // Screen filter modifications based on state changes
            if (domainActive && activeClass === 'infinity') {
                ctx.fillStyle = "rgba(4, 2, 18, 0.65)";
                ctx.fillRect(0, 0, width, height);
                
                // Cosmic Domain Stars Renderer
                ctx.fillStyle = "#fff";
                for (let i = 0; i < 20; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // A. GOJO ENERGY RENDER PROCESSOR
            if (activeClass === 'infinity') {
                if (isPressing) {
                    // Left Side / Right Side dynamic split handling
                    if (mouseX < width / 2) {
                        document.getElementById('active-catalyst').innerText = "Lapse: BLUE";
                        ctx.beginPath();
                        let g = ctx.createRadialGradient(mouseX, mouseY, 2, mouseX, mouseY, 35);
                        g.addColorStop(0, '#fff');
                        g.addColorStop(0.4, 'var(--neon-blue)');
                        g.addColorStop(1, 'transparent');
                        ctx.fillStyle = g;
                        ctx.arc(mouseX, mouseY, 35, 0, Math.PI * 2);
                        ctx.fill();
                        if (Math.random() > 0.2) addParticle(mouseX, mouseY, 'var(--neon-blue)');
                    } else {
                        document.getElementById('active-catalyst').innerText = "Reversal: RED";
                        ctx.beginPath();
                        let g = ctx.createRadialGradient(mouseX, mouseY, 2, mouseX, mouseY, 35);
                        g.addColorStop(0, '#fff');
                        g.addColorStop(0.4, 'var(--neon-red)');
                        g.addColorStop(1, 'transparent');
                        ctx.fillStyle = g;
                        ctx.arc(mouseX, mouseY, 35, 0, Math.PI * 2);
                        ctx.fill();
                        if (Math.random() > 0.2) addParticle(mouseX, mouseY, 'var(--neon-red)');
                    }
                }

            // B. DOCTOR STRANGE MYSTIC ARTS ENGINE
            } else if (activeClass === 'mystic') {
                ctx.save();
                ctx.translate(mouseX, mouseY);
                ctx.rotate(performance.now() * 0.002);
                ctx.strokeStyle = 'var(--mystic-gold)';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'var(--mystic-gold)';
                
                // Geometry Mandala Trace
                ctx.beginPath();
                ctx.arc(0, 0, 60, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    let r = (Math.PI / 3) * i;
                    ctx.lineTo(Math.cos(r) * 60, Math.sin(r) * 60);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
                
                if (Math.random() > 0.3) addParticle(mouseX, mouseY, 'var(--mystic-gold)');
            }

            // Continuous processing for independent particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.03;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            requestAnimationFrame(animationLoop);
        }
    </script>
</body>
</html>
