<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gojo Satoru — Limitless Engine Optimized</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');

    :root {
      --bg: #05060a;
      --cyan: #22d3ee;
      --blue: #3b82f6;
      --red: #ef4444;
      --purple: #a855f7;
      --white: #e5f6ff;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #0a1020 0%, #04050a 50%, #010103 100%);
      font-family: 'Share Tech Mono', monospace;
      color: white;
    }

    body { touch-action: manipulation; }

    /* Performance-friendly effects */
    .six-eyes-active {
      filter: contrast(120%) brightness(110%) saturate(135%);
    }

    .glitch-text {
      position: relative;
      animation: glitch 1.2s infinite linear alternate-reverse;
    }
    @keyframes glitch {
      0% { text-shadow: 2px 0 #ff3355, -2px 0 #2dd4ff; transform: translate(0,0); }
      100% { text-shadow: -2px 0 #ff3355, 2px 0 #2dd4ff; transform: translate(0.5px,-0.5px); }
    }

    .quake-triggered { animation: quake 0.08s linear infinite; }
    @keyframes quake {
      0% { transform: translate(0,0); }
      25% { transform: translate(-4px, 3px); }
      50% { transform: translate(4px, -3px); }
      75% { transform: translate(-3px, -4px); }
      100% { transform: translate(0,0); }
    }

    .damage-flash-active {
      animation: damageFlash 0.45s ease-out forwards;
    }
    @keyframes damageFlash {
      0% { opacity: 0; transform: scale(1); }
      12% { opacity: 1; transform: scale(1.02); background: rgba(255, 50, 60, 0.22); }
      100% { opacity: 0; transform: scale(1); background: transparent; }
    }

    .hud-panel {
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(34,211,238,0.32);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(34,211,238,0.12);
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 0.18em;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.7); }
    ::-webkit-scrollbar-thumb { background: rgba(34,211,238,0.8); border-radius: 999px; }

    canvas { image-rendering: auto; }
  </style>
</head>
<body class="relative select-none">
  <!-- Audio -->
  <audio id="audio-ambient" src="aura.mp3" loop preload="auto"></audio>
  <audio id="audio-blue" src="blue_lapse.mp3" preload="auto"></audio>
  <audio id="audio-red" src="red_reversal.mp3" preload="auto"></audio>
  <audio id="audio-purple" src="hollow_purple.mp3" preload="auto"></audio>
  <audio id="audio-domain" src="domain_expansion.mp3" preload="auto"></audio>
  <audio id="audio-impact" src="damage.mp3" preload="auto"></audio>

  <video class="input_video hidden" autoplay playsinline></video>

  <canvas id="domain-canvas" class="absolute inset-0 z-0 opacity-0 transition-opacity duration-500"></canvas>
  <canvas id="main-canvas" class="absolute inset-0 z-10"></canvas>
  <div id="damage-overlay" class="absolute inset-0 z-20 pointer-events-none opacity-0 mix-blend-screen"></div>

  <div class="absolute inset-0 z-30 pointer-events-none flex flex-col justify-between p-4 md:p-6">
    <div class="flex items-start justify-between gap-4">
      <div class="hud-panel rounded-2xl p-4 md:p-5 w-[18rem] md:w-[21rem]">
        <div class="card-title text-xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-blue-400 to-indigo-500">
          GOJO SATORU <span class="text-white/70 text-xs align-top">v7</span>
        </div>
        <div class="grid grid-cols-2 gap-x-3 gap-y-2 mt-4 text-[10px] md:text-[11px] uppercase tracking-[0.2em] text-slate-300">
          <div>CE Output:</div><div id="hud-ce" class="text-right text-cyan-300 font-bold">∞</div>
          <div>FPS Render:</div><div id="hud-fps" class="text-right text-green-400 font-bold">00</div>
          <div>Body Link:</div><div id="hud-body" class="text-right text-amber-300 font-bold">OFFLINE</div>
          <div>Hand Matrix:</div><div id="hud-hands" class="text-right text-amber-300 font-bold">OFFLINE</div>
        </div>
        <div class="mt-4">
          <div class="text-[10px] text-cyan-300 uppercase tracking-[0.25em] mb-1">Cursed Energy</div>
          <div class="h-2.5 rounded-full bg-slate-900 overflow-hidden border border-cyan-950">
            <div id="hud-energy" class="h-full w-0 bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600 shadow-[0_0_16px_rgba(34,211,238,0.55)] transition-all duration-200"></div>
          </div>
        </div>
      </div>

      <div class="hud-panel rounded-2xl p-4 md:p-5 w-[18rem] md:w-[21rem] h-[15rem] md:h-[16rem] flex flex-col">
        <div class="text-xs uppercase tracking-[0.25em] text-cyan-300 border-b border-cyan-950 pb-2 mb-2 flex items-center justify-between">
          <span>Soul Telemetry</span>
          <span class="flex items-center gap-2 text-red-400 animate-pulse"><span class="w-2 h-2 rounded-full bg-red-500"></span> LIVE</span>
        </div>
        <div id="terminal-logs" class="flex-1 overflow-y-auto text-[11px] leading-5 text-slate-300 pr-1 space-y-1 font-mono">
          <p class="text-cyan-400">&gt; Limitless Engine booting...</p>
          <p class="text-slate-400">&gt; Awaiting camera and hand signature.</p>
        </div>
      </div>
    </div>

    <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-center pointer-events-none">
      <div class="relative w-64 h-64 rounded-full border border-cyan-500/10 flex items-center justify-center">
        <div class="absolute inset-0 rounded-full border border-cyan-500/30 animate-spin" style="animation-duration: 14s;"></div>
        <div class="absolute inset-6 rounded-full border border-blue-500/20 animate-spin" style="animation-duration: 22s; animation-direction: reverse;"></div>
        <div class="absolute w-full h-px bg-cyan-500/15"></div>
        <div class="absolute h-full w-px bg-cyan-500/15"></div>
        <div class="w-2 h-2 rounded-full bg-cyan-300 animate-pulse shadow-[0_0_18px_rgba(34,211,238,0.9)]"></div>
      </div>
    </div>

    <div class="flex flex-col items-center gap-4 md:gap-6">
      <div class="hud-panel rounded-2xl px-6 py-4 md:px-10 md:py-5 text-center max-w-[92vw]">
        <div id="technique-title" class="card-title text-2xl md:text-4xl font-black text-slate-400 uppercase tracking-[0.18em]">SYSTEM IDLE</div>
        <div id="technique-desc" class="mt-2 text-[11px] md:text-sm uppercase tracking-[0.2em] text-cyan-100/80 font-bold">Stand in frame to awaken the Limitless</div>
      </div>

      <div class="w-full flex items-end justify-between gap-4 pointer-events-auto px-1 md:px-4 pb-2">
        <div class="flex gap-2 md:gap-4 flex-wrap">
          <div class="hud-panel rounded-2xl p-3 md:p-4 min-w-[96px] md:min-w-[120px] text-center">
            <div class="text-[9px] md:text-[10px] uppercase tracking-[0.22em] text-blue-300 font-bold">Lapse: Blue</div>
            <div id="metric-blue" class="mt-1 text-xl md:text-2xl font-black text-white">0%</div>
          </div>
          <div class="hud-panel rounded-2xl p-3 md:p-4 min-w-[96px] md:min-w-[120px] text-center">
            <div class="text-[9px] md:text-[10px] uppercase tracking-[0.22em] text-red-300 font-bold">Reversal: Red</div>
            <div id="metric-red" class="mt-1 text-xl md:text-2xl font-black text-white">0%</div>
          </div>
          <div class="hud-panel rounded-2xl p-3 md:p-4 min-w-[96px] md:min-w-[120px] text-center">
            <div class="text-[9px] md:text-[10px] uppercase tracking-[0.22em] text-purple-300 font-bold">Hollow: Purple</div>
            <div id="metric-purple" class="mt-1 text-xl md:text-2xl font-black text-white">LOCK</div>
          </div>
        </div>

        <button id="start-btn" class="relative overflow-hidden rounded-2xl border border-cyan-400/70 px-5 md:px-10 py-3 md:py-4 font-black uppercase tracking-[0.2em] text-sm md:text-lg bg-black/90 active:scale-95 transition-transform shadow-[0_0_30px_rgba(34,211,238,0.15)]">
          <span class="absolute inset-0 bg-gradient-to-r from-blue-900 via-cyan-600 to-indigo-900 opacity-85"></span>
          <span class="relative z-10">Awaken Six Eyes</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const video = document.querySelector('.input_video');
    const mainCanvas = document.getElementById('main-canvas');
    const domainCanvas = document.getElementById('domain-canvas');
    const damageOverlay = document.getElementById('damage-overlay');
    const ctx = mainCanvas.getContext('2d', { alpha: false, desynchronized: true });
    const dctx = domainCanvas.getContext('2d', { alpha: false, desynchronized: true });

    const ui = {
      fps: document.getElementById('hud-fps'),
      body: document.getElementById('hud-body'),
      hands: document.getElementById('hud-hands'),
      energy: document.getElementById('hud-energy'),
      logs: document.getElementById('terminal-logs'),
      title: document.getElementById('technique-title'),
      desc: document.getElementById('technique-desc'),
      start: document.getElementById('start-btn'),
      blue: document.getElementById('metric-blue'),
      red: document.getElementById('metric-red'),
      purple: document.getElementById('metric-purple')
    };

    const audio = {
      ambient: document.getElementById('audio-ambient'),
      blue: document.getElementById('audio-blue'),
      red: document.getElementById('audio-red'),
      purple: document.getElementById('audio-purple'),
      domain: document.getElementById('audio-domain'),
      impact: document.getElementById('audio-impact'),
      stopExcept(active) {
        ['blue','red','purple','domain'].forEach(k => {
          if (k !== active) {
            const a = this[k];
            a.pause();
            a.currentTime = 0;
          }
        });
      }
    };

    const state = {
      mode: 'IDLE',
      fpsFrameCount: 0,
      fpsLast: performance.now(),
      fps: 0,
      charge: { blue: 0, red: 0, purple: 0 },
      combo: { blueReady: false, redReady: false, lastReadyAt: 0 },
      energy: 0,
      redOrbRadius: 0,
      redOrbSpin: 0,
      shockwave: 0,
      bluePulse: 0,
      infinityPulse: 0,
      infinityHold: 0,
      voidHold: 0,
      lastBlastAt: 0,
      particles: [],
      starfield: [],
      domainStars: []
    };

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      mainCanvas.width = w;
      mainCanvas.height = h;
      domainCanvas.width = w;
      domainCanvas.height = h;
    }
    window.addEventListener('resize', resize);
    resize();

    function log(msg, cls = 'text-cyan-300') {
      const p = document.createElement('p');
      const t = new Date().toLocaleTimeString('en-GB', { hour12: false });
      p.className = `${cls} font-mono leading-5`;
      p.innerHTML = `<span class="text-slate-500">[${t}]</span> &gt; ${msg}`;
      ui.logs.appendChild(p);
      while (ui.logs.children.length > 28) ui.logs.removeChild(ui.logs.firstChild);
      ui.logs.scrollTop = ui.logs.scrollHeight;
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

    class Vector2 {
      constructor(x=0, y=0) { this.x = x; this.y = y; }
      add(v) { this.x += v.x; this.y += v.y; return this; }
      mult(s) { this.x *= s; this.y *= s; return this; }
      mag() { return Math.hypot(this.x, this.y); }
      normalize() { const m = this.mag() || 1; this.x /= m; this.y /= m; return this; }
    }

    class Particle {
      constructor(x, y, type) {
        this.pos = new Vector2(x, y);
        this.vel = new Vector2((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4);
        this.acc = new Vector2();
        this.type = type;
        this.life = 1;
        this.maxLife = 1;
        this.r = 2;
        this.alpha = 1;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;

        if (type === 'aura') {
          this.life = this.maxLife = Math.floor(Math.random() * 28 + 18);
          this.r = Math.random() * 5 + 2;
          this.vel.y = -(Math.random() * 2 + 1);
        } else if (type === 'blue') {
          this.life = this.maxLife = Math.floor(Math.random() * 26 + 12);
          this.r = Math.random() * 3 + 1;
          this.vel.mult(3.5);
        } else if (type === 'red') {
          this.life = this.maxLife = Math.floor(Math.random() * 18 + 8);
          this.r = Math.random() * 4 + 1;
          this.vel.mult(5);
        } else if (type === 'purple') {
          this.life = this.maxLife = Math.floor(Math.random() * 20 + 10);
          this.r = Math.random() * 5 + 2;
          this.vel.mult(5.5);
        } else if (type === 'debris') {
          this.life = this.maxLife = Math.floor(Math.random() * 48 + 24);
          this.r = Math.random() * 10 + 4;
          this.vel = new Vector2((Math.random() - 0.5) * 18, (Math.random() - 0.5) * 18);
        }
      }

      update(target) {
        if (this.type === 'aura') {
          this.vel.x += Math.sin((performance.now() + this.rot) * 0.01) * 0.12;
          this.vel.y -= 0.06;
          this.vel.mult(0.97);
        } else if (this.type === 'blue' && target) {
          const dir = new Vector2(target.x - this.pos.x, target.y - this.pos.y);
          const d = dir.mag();
          if (d > 4) {
            dir.normalize().mult(14 / (d * 0.08));
            this.acc.add(dir);
          }
          this.vel.mult(0.92);
        } else if (this.type === 'debris') {
          this.vel.y += 0.45;
          this.vel.mult(0.985);
          this.rot += this.rotSpeed;
        }

        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
        this.life--;
        this.alpha = this.life / this.maxLife;
      }

      draw(c) {
        if (this.alpha <= 0) return;
        c.save();
        c.translate(this.pos.x, this.pos.y);
        c.globalAlpha = clamp(this.alpha, 0, 1);

        if (this.type === 'debris') {
          c.rotate(this.rot);
          c.beginPath();
          c.moveTo(-this.r, -this.r * 0.4);
          c.lineTo(this.r * 0.7, -this.r * 0.6);
          c.lineTo(this.r, this.r * 0.5);
          c.lineTo(-this.r * 0.3, this.r);
          c.closePath();
          c.fillStyle = 'rgba(35, 35, 42, 0.95)';
          c.strokeStyle = 'rgba(135, 145, 165, 0.7)';
          c.shadowColor = '#000';
          c.shadowBlur = 8;
          c.lineWidth = 1;
          c.fill();
          c.stroke();
        } else {
          c.beginPath();
          c.arc(0, 0, this.r, 0, Math.PI * 2);
          if (this.type === 'aura') {
            c.fillStyle = 'rgba(34, 211, 238, 0.9)';
            c.shadowColor = '#22d3ee';
            c.shadowBlur = this.r * 3;
          } else if (this.type === 'blue') {
            c.fillStyle = 'rgba(59, 130, 246, 1)';
            c.shadowColor = '#3b82f6';
            c.shadowBlur = this.r * 4;
          } else if (this.type === 'red') {
            c.fillStyle = 'rgba(239, 68, 68, 1)';
            c.shadowColor = '#ef4444';
            c.shadowBlur = this.r * 4;
          } else if (this.type === 'purple') {
            c.fillStyle = 'rgba(168, 85, 247, 1)';
            c.shadowColor = '#a855f7';
            c.shadowBlur = this.r * 4;
          }
          c.fill();
        }
        c.restore();
      }
    }

    function spawn(x, y, type, count) {
      const maxParticles = 720;
      for (let i = 0; i < count; i++) {
        if (state.particles.length > maxParticles) state.particles.shift();
        state.particles.push(new Particle(x, y, type));
      }
    }

    function drawInfinity(c, x, y, intensity = 1) {
      c.save();
      c.translate(x, y);
      const base = 90 + Math.sin(performance.now() * 0.005) * 8;
      const radius = base + (intensity * 18);

      c.beginPath();
      c.arc(0, 0, radius + 18, 0, Math.PI * 2);
      c.strokeStyle = `rgba(34, 211, 238, ${0.08 + 0.05 * intensity})`;
      c.lineWidth = 2;
      c.stroke();

      c.beginPath();
      c.arc(0, 0, radius, 0, Math.PI * 2);
      c.strokeStyle = `rgba(34, 211, 238, ${0.42 + 0.28 * intensity})`;
      c.shadowColor = '#22d3ee';
      c.shadowBlur = 28;
      c.lineWidth = 4;
      c.stroke();

      c.beginPath();
      c.arc(0, 0, radius * 0.55, 0, Math.PI * 2);
      c.strokeStyle = `rgba(255,255,255, ${0.15 + 0.1 * intensity})`;
      c.lineWidth = 1.5;
      c.stroke();
      c.restore();
    }

    function drawRedOrb(c, x, y) {
      state.redOrbRadius = Math.min(state.redOrbRadius + 1.8, 42);
      state.redOrbSpin += 0.14;
      c.save();
      c.translate(x, y);

      const g = c.createRadialGradient(0, 0, 0, 0, 0, state.redOrbRadius * 2.8);
      g.addColorStop(0, 'rgba(255, 0, 50, 0.85)');
      g.addColorStop(1, 'rgba(255, 0, 50, 0)');
      c.beginPath();
      c.arc(0, 0, state.redOrbRadius * 2.8, 0, Math.PI * 2);
      c.fillStyle = g;
      c.fill();

      c.beginPath();
      c.arc(0, 0, state.redOrbRadius, 0, Math.PI * 2);
      c.fillStyle = '#ff1744';
      c.shadowColor = '#ff1744';
      c.shadowBlur = 28;
      c.fill();

      c.rotate(state.redOrbSpin);
      c.beginPath();
      c.arc(0, 0, state.redOrbRadius * 0.42, 0, Math.PI * 2);
      c.fillStyle = '#050505';
      c.shadowBlur = 0;
      c.fill();
      c.restore();
    }

    function drawPurpleBurst(c, x, y) {
      const t = performance.now();
      const wave = 50 + (t - state.lastBlastAt) * 0.32;
      c.save();
      c.translate(x, y);
      c.strokeStyle = 'rgba(168, 85, 247, 0.8)';
      c.lineWidth = 4;
      c.shadowColor = '#a855f7';
      c.shadowBlur = 30;
      c.beginPath();
      c.arc(0, 0, wave, 0, Math.PI * 2);
      c.stroke();
      c.restore();
    }

    function drawBlueSingularity(c, x, y, scale = 1) {
      c.save();
      c.translate(x, y);
      const pulse = 1 + Math.sin(performance.now() * 0.01) * 0.08;
      const r = 18 * scale * pulse;

      const outer = c.createRadialGradient(0, 0, 0, 0, 0, r * 8);
      outer.addColorStop(0, 'rgba(255,255,255,0.15)');
      outer.addColorStop(0.18, 'rgba(34,211,238,0.28)');
      outer.addColorStop(0.45, 'rgba(59,130,246,0.18)');
      outer.addColorStop(1, 'rgba(59,130,246,0)');
      c.fillStyle = outer;
      c.beginPath();
      c.arc(0, 0, r * 8, 0, Math.PI * 2);
      c.fill();

      c.shadowColor = '#22d3ee';
      c.shadowBlur = 26;
      c.strokeStyle = 'rgba(34,211,238,0.9)';
      c.lineWidth = 3;
      c.beginPath();
      c.arc(0, 0, r * 2.2, 0, Math.PI * 2);
      c.stroke();

      c.fillStyle = '#ffffff';
      c.beginPath();
      c.arc(0, 0, r * 0.45, 0, Math.PI * 2);
      c.fill();
      c.restore();
    }

    function triggerBlueMaximum(x, y) {
      log('MAXIMUM OUTPUT BLUE — GRAVITY SINGULARITY!', 'text-blue-300 font-bold');
      state.bluePulse = 1;
      state.shockwave = 1;
      state.combo.blueReady = true;
      state.combo.lastReadyAt = performance.now();
      audio.blue.currentTime = 0;
      audio.blue.volume = 0.9;
      audio.blue.play().catch(() => {});
      audio.impact.currentTime = 0;
      audio.impact.volume = 0.55;
      audio.impact.play().catch(() => {});
      spawn(x, y, 'blue', 28);
      spawn(x, y, 'aura', 18);
      spawn(x, y, 'debris', 28);
      document.body.classList.add('quake-triggered');
      setTimeout(() => document.body.classList.remove('quake-triggered'), 420);
      if (state.combo.redReady) {
        state.combo.blueReady = false;
        state.combo.redReady = false;
        triggerComboPurple(x, y);
      }
    }

    function drawVoidStep(c, x, y) {
      c.save();
      c.translate(x, y);
      c.shadowColor = '#22d3ee';
      c.shadowBlur = 18;
      for (let i = 0; i < 2; i++) {
        c.beginPath();
        c.arc(0, 0, 45 + i * 18, 0, Math.PI * 2);
        c.strokeStyle = i === 0 ? 'rgba(255,255,255,0.7)' : 'rgba(34,211,238,0.55)';
        c.lineWidth = 3 - i;
        c.stroke();
      }
      c.restore();
    }

    function triggerDamageImpact(x, y, kind = 'red') {
      const now = performance.now();
      if (now - state.lastBlastAt < 350) return;
      state.lastBlastAt = now;

      log('MASSIVE ENERGY DISCHARGE DETECTED!', 'text-red-400 font-bold');
      audio.impact.currentTime = 0;
      audio.impact.volume = 0.85;
      audio.impact.play().catch(() => {});

      damageOverlay.classList.remove('damage-flash-active');
      void damageOverlay.offsetWidth;
      damageOverlay.classList.add('damage-flash-active');

      spawn(x, y, 'debris', kind === 'purple' ? 90 : 60);
      spawn(x, y, kind === 'purple' ? 'purple' : 'red', kind === 'purple' ? 24 : 18);
      document.body.classList.add('quake-triggered');
      setTimeout(() => document.body.classList.remove('quake-triggered'), 500);
    }

    function triggerComboPurple(x, y) {
      log('BLUE + RED COMBO — HOLLOW PURPLE AUTO-CREATED!', 'text-purple-300 font-bold');
      state.charge.purple = 100;
      ui.purple.textContent = 'ERASE';
      ui.title.textContent = 'HOLLOW: PURPLE';
      ui.title.className = 'card-title text-2xl md:text-5xl font-black text-purple-300 uppercase tracking-[0.18em] animate-pulse drop-shadow-[0_0_26px_rgba(168,85,247,0.95)]';
      ui.desc.textContent = 'Auto-created by Blue + Red combo.';
      ui.energy.style.width = '100%';
      triggerDamageImpact(x, y, 'purple');
      audio.purple.currentTime = 0;
      audio.purple.volume = 0.95;
      audio.purple.play().catch(() => {});
      spawn(x, y, 'purple', 44);
      spawn(x, y, 'debris', 96);
      state.combo.blueReady = false;
      state.combo.redReady = false;
      state.charge.blue = 0;
      state.charge.red = 0;
      ui.blue.textContent = '0%';
      ui.red.textContent = '0%';
    }

    function triggerMaximumBlast(x, y) {
      log('MAXIMUM OUTPUT REACHED — BLAST RELEASED!', 'text-purple-300 font-bold');
      state.shockwave = 1;
      state.combo.redReady = true;
      state.combo.lastReadyAt = performance.now();
      triggerDamageImpact(x, y, 'purple');
      spawn(x, y, 'purple', 40);
      spawn(x, y, 'debris', 90);
      audio.purple.currentTime = 0;
      audio.purple.volume = 0.9;
      audio.purple.play().catch(() => {});
      if (state.combo.blueReady) {
        state.combo.blueReady = false;
        state.combo.redReady = false;
        triggerComboPurple(x, y);
      }
    }

    function analyzeGesture(results) {
      const l = results.leftHandLandmarks;
      const r = results.rightHandLandmarks;

      function isHandOpen(h) {
        if (!h) return false;
        const index = h[8].y < h[6].y;
        const middle = h[12].y < h[10].y;
        const ring = h[16].y < h[14].y;
        const pinky = h[20].y < h[18].y;
        return index && middle && ring && pinky;
      }

      function isHandClosed(h) {
        if (!h) return false;
        const index = h[8].y > h[6].y;
        const middle = h[12].y > h[10].y;
        const ring = h[16].y > h[14].y;
        const pinky = h[20].y > h[18].y;
        return index && middle && ring && pinky;
      }

      if (l && r) {
        const wristsClose = dist(l[0], r[0]) < 0.19;
        const palmsSpread = dist(l[8], r[8]) > 0.16;
        const bothOpen = isHandOpen(l) && isHandOpen(r);
        const bothClosed = isHandClosed(l) && isHandClosed(r);

        if (bothOpen && wristsClose) return 'INFINITY';
        if (bothClosed && wristsClose) return 'VOID_STEP';
        if (wristsClose && palmsSpread) return 'DOMAIN';
        if (dist(l[8], r[8]) < 0.12) return 'PURPLE';
      }

      if ((l && !r) || (!l && r)) {
        const h = l || r;
        const iTip = h[8], iPip = h[6];
        const mTip = h[12], mPip = h[10];
        const rTip = h[16], rPip = h[14];
        const pTip = h[20], pPip = h[18];
        const tTip = h[4];
        const wrist = h[0];

        const isIndexExtended = iTip.y < iPip.y && dist(iTip, wrist) > 0.15;
        const isMidFolded = mTip.y > mPip.y;
        const isRingFolded = rTip.y > rPip.y;
        const isPinkyFolded = pTip.y > pPip.y;

        if (isIndexExtended && isMidFolded && isRingFolded && isPinkyFolded) return 'RED';
        if (dist(iTip, tTip) < 0.04) return 'BLUE';
      }

      return results.poseLandmarks ? 'AURA' : 'IDLE';
    }

    function setState(newState, results, targetPoint) {
      if (state.mode === newState) return;
      state.mode = newState;

      ui.hands.textContent = (results.leftHandLandmarks || results.rightHandLandmarks) ? 'LINKED' : 'SEARCHING';
      ui.body.textContent = results.poseLandmarks ? 'LINKED' : 'SEARCHING';

      audio.stopExcept(null);
      document.body.classList.remove('six-eyes-active');
      domainCanvas.classList.remove('opacity-100');
      domainCanvas.classList.add('opacity-0');

      switch (newState) {
        case 'IDLE':
          ui.title.textContent = 'SYSTEM IDLE';
          ui.title.className = 'card-title text-2xl md:text-4xl font-black text-slate-400 uppercase tracking-[0.18em]';
          ui.desc.textContent = 'Stand in frame to awaken the Limitless';
          ui.energy.style.width = '0%';
          ui.blue.textContent = '0%';
          ui.red.textContent = '0%';
          ui.purple.textContent = 'LOCK';
          break;
        case 'AURA':
          ui.title.textContent = 'CURSED ENERGY: OVERFLOW';
          ui.title.className = 'card-title text-2xl md:text-4xl font-black text-cyan-300 uppercase tracking-[0.18em] drop-shadow-[0_0_12px_rgba(34,211,238,0.75)]';
          ui.desc.textContent = 'Limitless active. Body nodes radiating aura.';
          ui.energy.style.width = '35%';
          ui.blue.textContent = `${Math.min(100, Number(ui.blue.textContent) || 0)}%`;
          audio.ambient.volume = 0.32;
          audio.ambient.play().catch(() => {});
          break;
        case 'BLUE':
          ui.title.textContent = 'MAXIMUM OUTPUT: BLUE';
          ui.title.className = 'card-title text-2xl md:text-5xl font-black text-blue-300 uppercase tracking-[0.18em] glitch-text drop-shadow-[0_0_28px_rgba(59,130,246,0.95)]';
          ui.desc.textContent = 'Blue at full output. Gravity singularity locked.';
          ui.energy.style.width = '100%';
          audio.blue.currentTime = 0;
          audio.blue.volume = 0.95;
          audio.blue.play().catch(() => {});
          break;
        case 'RED':
          ui.title.textContent = 'REVERSAL: RED';
          ui.title.className = 'card-title text-2xl md:text-4xl font-black text-red-400 uppercase tracking-[0.18em] drop-shadow-[0_0_18px_rgba(239,68,68,0.95)]';
          ui.desc.textContent = 'Repulsion orb charging to full output.';
          ui.energy.style.width = '90%';
          document.body.classList.add('quake-triggered');
          audio.red.currentTime = 0;
          audio.red.volume = 0.85;
          audio.red.play().catch(() => {});
          break;
        case 'PURPLE':
          ui.title.textContent = 'HOLLOW: PURPLE';
          ui.title.className = 'card-title text-2xl md:text-5xl font-black text-purple-300 uppercase tracking-[0.18em] animate-pulse drop-shadow-[0_0_26px_rgba(168,85,247,0.95)]';
          ui.desc.textContent = 'Imaginary mass erasure. Maximum destruction output.';
          ui.energy.style.width = '100%';
          ui.purple.textContent = 'ERASE';
          document.body.classList.add('quake-triggered');
          audio.purple.currentTime = 0;
          audio.purple.volume = 0.9;
          audio.purple.play().catch(() => {});
          if (targetPoint) triggerDamageImpact(targetPoint.x, targetPoint.y, 'purple');
          break;
        case 'INFINITY':
          ui.title.textContent = 'INFINITY: ACTIVE';
          ui.title.className = 'card-title text-2xl md:text-5xl font-black text-cyan-300 uppercase tracking-[0.18em] drop-shadow-[0_0_28px_rgba(34,211,238,0.95)]';
          ui.desc.textContent = 'Easy mode: both open hands + wrists close.';
          ui.energy.style.width = '100%';
          ui.blue.textContent = '∞';
          ui.red.textContent = '∞';
          ui.purple.textContent = '∞';
          state.infinityPulse = 1;
          audio.ambient.volume = 0.36;
          audio.ambient.play().catch(() => {});
          break;
        case 'VOID_STEP':
          ui.title.textContent = 'VOID STEP';
          ui.title.className = 'card-title text-2xl md:text-5xl font-black text-white uppercase tracking-[0.18em] drop-shadow-[0_0_20px_rgba(255,255,255,0.8)]';
          ui.desc.textContent = 'Both fists closed + wrists close = instant micro-burst.';
          ui.energy.style.width = '85%';
          audio.ambient.volume = 0.28;
          audio.ambient.play().catch(() => {});
          if (targetPoint) triggerDamageImpact(targetPoint.x, targetPoint.y, 'blue');
          break;
        case 'DOMAIN':
          ui.title.textContent = 'RYOIKI TENKAI';
          ui.title.className = 'card-title text-2xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-indigo-400 uppercase tracking-[0.18em] drop-shadow-[0_0_30px_rgba(255,255,255,0.75)]';
          ui.desc.textContent = 'Infinite Void. Absolute perception flood.';
          ui.energy.style.width = '100%';
          document.body.classList.add('six-eyes-active');
          domainCanvas.classList.remove('opacity-0');
          domainCanvas.classList.add('opacity-100');
          audio.domain.currentTime = 0;
          audio.domain.volume = 0.8;
          audio.domain.play().catch(() => {});
          break;
      }
    }

    function drawDomainBackground() {
      const w = domainCanvas.width, h = domainCanvas.height;
      dctx.fillStyle = 'rgba(2,2,8,1)';
      dctx.fillRect(0, 0, w, h);
      dctx.fillStyle = 'rgba(255,255,255,0.85)';

      if (!state.domainStars.length) {
        state.domainStars = Array.from({ length: 140 }, () => ({
          x: Math.random() * 2000 - 1000,
          y: Math.random() * 2000 - 1000,
          z: Math.random() * 2000 + 50
        }));
      }

      const cx = w / 2, cy = h / 2;
      for (const s of state.domainStars) {
        s.z -= 18;
        if (s.z <= 1) {
          s.z = 2000;
          s.x = Math.random() * 2000 - 1000;
          s.y = Math.random() * 2000 - 1000;
        }
        const k = 450 / s.z;
        const x = s.x * k + cx;
        const y = s.y * k + cy;
        if (x > 0 && x < w && y > 0 && y < h) {
          dctx.beginPath();
          dctx.arc(x, y, Math.max(0.6, k * 1.4), 0, Math.PI * 2);
          dctx.fill();
        }
      }
    }

    function drawFrame(results, targetPoint) {
      const w = mainCanvas.width, h = mainCanvas.height;
      ctx.save();
      ctx.clearRect(0, 0, w, h);
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(results.image, 0, 0, w, h);

      // subtle overlay for better contrast
      const overlay = ctx.createLinearGradient(0, 0, 0, h);
      overlay.addColorStop(0, 'rgba(0,0,0,0.08)');
      overlay.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = overlay;
      ctx.fillRect(0, 0, w, h);

      if (results.poseLandmarks) {
        const nodes = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26];
        for (const i of nodes) {
          const n = results.poseLandmarks[i];
          if (n && n.visibility > 0.45 && Math.random() > 0.42) {
            spawn(n.x * w, n.y * h, 'aura', 1);
          }
        }
        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, { color: 'rgba(34, 211, 238, 0.18)', lineWidth: 1 });
      }

      let handPoint = null;
      const processHand = (hand, side) => {
        drawConnectors(ctx, hand, HAND_CONNECTIONS, { color: 'rgba(34, 211, 238, 0.45)', lineWidth: 1 });
        const tip = { x: hand[8].x * w, y: hand[8].y * h };
        handPoint = tip;

        if (state.mode === 'BLUE') {
          spawn(tip.x, tip.y, 'blue', 16);
          spawn(tip.x, tip.y, 'aura', 4);
          drawBlueSingularity(ctx, tip.x, tip.y, 0.95);
          state.charge.blue = clamp(state.charge.blue + 3.8, 0, 100);
          ui.blue.textContent = `${Math.floor(state.charge.blue)}%`;
          if (state.charge.blue >= 100) {
            triggerBlueMaximum(tip.x, tip.y);
            state.charge.blue = 0;
            ui.blue.textContent = '0%';
          }
        } else if (state.mode === 'RED') {
          drawRedOrb(ctx, tip.x, tip.y);
          state.charge.red = clamp(state.charge.red + 2.5, 0, 100);
          ui.red.textContent = `${Math.floor(state.charge.red)}%`;
          if (state.charge.red >= 100) {
            triggerMaximumBlast(tip.x, tip.y);
            state.charge.red = 0;
            ui.red.textContent = '0%';
          }
        } else if (state.mode === 'PURPLE') {
          spawn(tip.x, tip.y, 'purple', 10);
          drawPurpleBurst(ctx, tip.x, tip.y);
        } else if (state.mode === 'INFINITY') {
        const pulse = 1 + Math.sin(performance.now() * 0.008) * 0.08;
        ctx.save();
        ctx.translate(w / 2, h / 2);
        ctx.strokeStyle = 'rgba(34, 211, 238, 0.35)';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#22d3ee';
        ctx.shadowBlur = 24;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(0, 0, (110 + i * 22) * pulse, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
        spawn(w / 2, h / 2, 'aura', 2);
      }

      if (state.mode === 'BLUE' && state.charge.blue > 80) {
        state.bluePulse = Math.min(1, state.bluePulse + 0.03);
        ctx.save();
        ctx.globalAlpha = 0.18 + state.bluePulse * 0.22;
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(0, 0, w, h);
        ctx.restore();
      } else if (state.mode === 'VOID_STEP') {
          spawn(tip.x, tip.y, 'blue', 4);
          spawn(tip.x, tip.y, 'aura', 2);
          drawVoidStep(ctx, tip.x, tip.y);
        }
      };

      if (results.leftHandLandmarks) processHand(results.leftHandLandmarks, 'left');
      if (results.rightHandLandmarks) processHand(results.rightHandLandmarks, 'right');

      if (results.poseLandmarks && state.mode !== 'IDLE') {
        drawInfinity(ctx, w / 2, h / 2, state.mode === 'DOMAIN' ? 1.2 : state.mode === 'INFINITY' ? 1.4 : 0.75);
      }

      if (state.mode === 'INFINITY') {
        const pulse = 1 + Math.sin(performance.now() * 0.008) * 0.08;
        ctx.save();
        ctx.translate(w / 2, h / 2);
        ctx.strokeStyle = 'rgba(34, 211, 238, 0.35)';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#22d3ee';
        ctx.shadowBlur = 24;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(0, 0, (110 + i * 22) * pulse, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
        spawn(w / 2, h / 2, 'aura', 2);
      }

      if (state.shockwave > 0.01) {
        ctx.save();
        ctx.translate(w / 2, h / 2);
        const r = 40 + (1 - state.shockwave) * Math.max(w, h) * 0.65;
        ctx.strokeStyle = `rgba(255,255,255,${state.shockwave * 0.75})`;
        ctx.lineWidth = 5;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
        state.shockwave *= 0.92;
      }

      for (let i = state.particles.length - 1; i >= 0; i--) {
        const p = state.particles[i];
        p.update(handPoint);
        p.draw(ctx);
        if (p.life <= 0 || p.alpha <= 0) state.particles.splice(i, 1);
      }

      ctx.restore();

      // HUD values
      ui.energy.style.width = `${Math.min(100, Math.max(0, state.energy))}%`;
      ui.blue.textContent = `${Math.floor(state.charge.blue)}%`;
      if (state.mode !== 'PURPLE') {
        ui.purple.textContent = state.charge.purple >= 100 ? 'ERASE' : 'LOCK';
      }
    }

    function tickFPS() {
      state.fpsFrameCount++;
      const now = performance.now();
      if (now - state.fpsLast >= 1000) {
        state.fps = state.fpsFrameCount;
        ui.fps.textContent = String(state.fps).padStart(2, '0');
        state.fpsFrameCount = 0;
        state.fpsLast = now;
      }
    }

    function onHolisticResults(results) {
      tickFPS();

      if (results.poseLandmarks) {
        ui.body.textContent = 'LINKED';
        ui.body.className = 'text-right text-green-400 font-bold';
      } else {
        ui.body.textContent = 'SEARCHING';
        ui.body.className = 'text-right text-red-400 font-bold animate-pulse';
      }

      if (results.leftHandLandmarks || results.rightHandLandmarks) {
        ui.hands.textContent = 'LINKED';
        ui.hands.className = 'text-right text-green-400 font-bold';
      } else {
        ui.hands.textContent = 'SEARCHING';
        ui.hands.className = 'text-right text-red-400 font-bold animate-pulse';
      }

      const nextState = analyzeGesture(results);
      const targetPoint = results.rightHandLandmarks
        ? { x: mainCanvas.width - (results.rightHandLandmarks[8].x * mainCanvas.width), y: results.rightHandLandmarks[8].y * mainCanvas.height }
        : results.leftHandLandmarks
          ? { x: mainCanvas.width - (results.leftHandLandmarks[8].x * mainCanvas.width), y: results.leftHandLandmarks[8].y * mainCanvas.height }
          : null;

      if (nextState !== state.mode) {
        log(`Quantum signature shift: [${nextState}] detected.`, 'text-yellow-300 font-bold');
        setState(nextState, results, targetPoint);
      }

      if (results.poseLandmarks) {
        state.energy = clamp(state.energy + (state.mode === 'RED' ? 3 : state.mode === 'BLUE' ? 3.4 : state.mode === 'PURPLE' ? 4 : state.mode === 'INFINITY' ? 2.5 : state.mode === 'VOID_STEP' ? 2.2 : 1), 0, 100);
      } else {
        state.energy = clamp(state.energy - 1.2, 0, 100);
      }

      if (state.mode === 'INFINITY') {
        state.infinityPulse = Math.max(state.infinityPulse * 0.96, 0.08);
      }

      if (state.mode === 'DOMAIN') {
        drawDomainBackground();
      }

      drawFrame(results, targetPoint);
    }

    const holistic = new Holistic({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`
    });

    holistic.setOptions({
      modelComplexity: 0,
      smoothLandmarks: true,
      enableSegmentation: false,
      refineFaceLandmarks: false,
      minDetectionConfidence: 0.65,
      minTrackingConfidence: 0.65
    });
    holistic.onResults(onHolisticResults);

    ui.start.addEventListener('click', async () => {
      ui.start.style.display = 'none';
      log('Booting Holistic AI Core...', 'text-green-400');
      audio.ambient.volume = 0.28;
      try { await audio.ambient.play(); } catch (e) { log('Audio blocked by browser policy.', 'text-red-400'); }

      const cam = new Camera(video, {
        width: 1280,
        height: 720,
        onFrame: async () => {
          await holistic.send({ image: video });
        }
      });

      cam.start()
        .then(() => log('Vessel identified. Six Eyes calibrated.', 'text-cyan-300 font-bold'))
        .catch(err => log(`Fatal feed error: ${err}`, 'text-red-400 font-bold'));
    });

    // initial state
    setState('IDLE', { poseLandmarks: null, leftHandLandmarks: null, rightHandLandmarks: null }, null);
  </script>
</body>
</html>
