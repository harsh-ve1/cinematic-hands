<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojo Satoru - Limitless Ultimate Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-void: #020206;
            --gojo-blue: #00a2ff;
            --gojo-red: #ff0044;
            --gojo-purple: #a200ff;
            --panel-glass: rgba(8, 10, 24, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-void);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 2;
        }

        /* Six Eyes Upper Diagnostics HUD */
        .six-eyes-hud {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .hud-card {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            min-width: 260px;
        }

        .hud-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 6px;
            font-weight: 800;
        }

        .hud-data {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hud-data .label { color: rgba(255, 255, 255, 0.5); }
        .hud-data .value { font-weight: 700; color: #fff; }

        /* 🔴 MANDATORY REQUEST: BOTTOM SUB-OPTIONS MENU */
        #technique-menu {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 50px;
            pointer-events: auto;
        }

        .btn-tech {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-tech:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-tech.active[data-tech="blue"] { color: #fff; border-color: var(--gojo-blue); background: rgba(0, 162, 255, 0.15); text-shadow: 0 0 8px var(--gojo-blue); box-shadow: 0 0 15px rgba(0, 162, 255, 0.2); }
        .btn-tech.active[data-tech="red"] { color: #fff; border-color: var(--gojo-red); background: rgba(255, 0, 68, 0.15); text-shadow: 0 0 8px var(--gojo-red); box-shadow: 0 0 15px rgba(255, 0, 68, 0.2); }
        .btn-tech.active[data-tech="purple"] { color: #fff; border-color: var(--gojo-purple); background: rgba(162, 0, 255, 0.15); text-shadow: 0 0 8px var(--gojo-purple); box-shadow: 0 0 15px rgba(162, 0, 255, 0.2); }

        /* Gateway Screen Overlay */
        #gateway-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #0a0e29 0%, #020206 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .void-title {
            font-size: 2.6rem;
            font-weight: 200;
            letter-spacing: 12px;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .sync-btn {
            padding: 20px 52px;
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(45deg, var(--gojo-blue), var(--gojo-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 162, 255, 0.25);
            transition: all 0.3s ease;
        }

        .sync-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(162, 0, 255, 0.45);
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="viewport-container">
        <div id="gateway-overlay">
            <h1 class="void-title">LIMITLESS AR</h1>
            <p style="color: #434770; margin-bottom: 40px; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase;">六眼 (Six Eyes) Hand Tracking Matrix</p>
            <button class="sync-btn" id="syncBtn">Synchronize Core</button>
        </div>

        <video id="webcam" autoplay playsinline></video>
        <canvas id="renderCanvas"></canvas>

        <div class="six-eyes-hud">
            <div class="hud-card">
                <div class="hud-title">System Status</div>
                <div class="hud-data"><span class="label">Cursed Tracker</span><span class="value" id="hud-status" style="color: red;">OFFLINE</span></div>
            </div>
            <div class="hud-card">
                <div class="hud-title">Output State</div>
                <div class="hud-data"><span class="label">Current Mode</span><span class="value" id="active-technique" style="font-weight: 800;">Awaiting Input</span></div>
            </div>
        </div>

        <div id="technique-menu" class="glass-module">
            <button class="btn-tech active" data-tech="blue">LAPSE: BLUE</button>
            <button class="btn-tech" data-tech="red">REVERSAL: RED</button>
            <button class="btn-tech" data-tech="purple">HOLLOW: PURPLE</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let selectedTechnique = 'blue'; // Selected via manual sub-option bar or gestures

        function resizeViewport() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeViewport);
        resizeViewport();

        // Sub-Options Manual Clicks Setup
        document.querySelectorAll('.btn-tech').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-tech').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                selectedTechnique = e.target.getAttribute('data-tech');
            });
        });

        // Initialize Native Core Camera Linkage
        document.getElementById('syncBtn').addEventListener('click', () => {
            document.getElementById('gateway-overlay').classList.add('hidden');
            initializeMediaPipeEngine();
        });

        function spawnParticle(x, y, type) {
            let angle = Math.random() * Math.PI * 2;
            if (type === 'blue') {
                let dist = 60 + Math.random() * 40;
                particles.push({
                    x: x + Math.cos(angle) * dist, y: y + Math.sin(angle) * dist,
                    vx: -Math.cos(angle) * 4, vy: -Math.sin(angle) * 4,
                    alpha: 1, size: Math.random() * 3 + 2, color: 'rgba(0, 162, 255, 0.9)', type
                });
            } else if (type === 'red') {
                let speed = 3 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    alpha: 1, size: Math.random() * 4 + 2, color: 'rgba(255, 0, 68, 0.9)', type
                });
            } else if (type === 'purple') {
                particles.push({
                    x: x + (Math.random() - 0.5) * 20, y: y + (Math.random() - 0.5) * 20,
                    vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
                    alpha: 1, size: Math.random() * 5 + 3, color: Math.random() > 0.4 ? '#a200ff' : '#e6b3ff', type
                });
            }
        }

        // MEDIAPIPE GESTURE RESOLUTION FRAME PROCESSOR
        function onTrackingResults(results) {
            ctx.clearRect(0, 0, width, height);

            // Draw Mirror Image Video Background Frame
            ctx.save();
            ctx.translate(width, 0); ctx.scale(-1, 1);
            ctx.filter = "brightness(0.4) contrast(1.2)";
            ctx.drawImage(results.image, 0, 0, width, height);
            ctx.restore();

            let handsDetected = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
            
            if (handsDetected > 0) {
                document.getElementById('hud-status').innerText = "TRACKING ACTIVE";
                document.getElementById('hud-status').style.color = "#00ffaa";

                // Read structural index fingertip position data vectors
                let primaryHand = results.multiHandLandmarks[0];
                let indexX = (1 - primaryHand[8].x) * width;
                let indexY = primaryHand[8].y * height;
                let thumbX = (1 - primaryHand[4].x) * width;
                let thumbY = primaryHand[4].y * height;

                // REAL GESTURE CHECK: Detect if User is pinching finger tips (Chutki gesture)
                let pinchGap = Math.hypot(primaryHand[4].x - primaryHand[8].x, primaryHand[4].y - primaryHand[8].y);
                let isGesturePinching = pinchGap < 0.045;

                // Automatic switch mode via physical gestures if pinching
                if (isGesturePinching && handsDetected === 1) {
                    let handLabel = results.multiHandedness[0].label;
                    selectedTechnique = (handLabel === 'Left') ? 'blue' : 'red';
                    
                    // Synchronize the bottom options menu highlight states automatically
                    document.querySelectorAll('.btn-tech').forEach(b => {
                        b.classList.remove('active');
                        if (b.getAttribute('data-tech') === selectedTechnique) b.classList.add('active');
                    });
                } else if (handsDetected === 2) {
                    // Two hands detected automatic gesture switches to Purple
                    selectedTechnique = 'purple';
                    document.querySelectorAll('.btn-tech').forEach(b => {
                        b.classList.remove('active');
                        if (b.getAttribute('data-tech') === 'purple') b.classList.add('active');
                    });
                }

                // RENDERING ENGINE EXECUTION SUB LAYERS
                let targetX = (indexX + thumbX) / 2;
                let targetY = (indexY + thumbY) / 2;

                if (selectedTechnique === 'blue') {
                    document.getElementById('active-technique').innerText = "LAPSE: BLUE";
                    document.getElementById('active-technique').style.color = 'var(--gojo-blue)';

                    let g = ctx.createRadialGradient(targetX, targetY, 2, targetX, targetY, 45);
                    g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#00d2ff'); g.addColorStop(1, 'transparent');
                    ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = 'var(--gojo-blue)';
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(targetX, targetY, 45, 0, Math.PI * 2); ctx.fill(); ctx.restore();

                    spawnParticle(targetX, targetY, 'blue'); spawnParticle(targetX, targetY, 'blue');

                } else if (selectedTechnique === 'red') {
                    document.getElementById('active-technique').innerText = "REVERSAL: RED";
                    document.getElementById('active-technique').style.color = 'var(--gojo-red)';

                    let g = ctx.createRadialGradient(targetX, targetY, 2, targetX, targetY, 42);
                    g.addColorStop(0, '#fff'); g.addColorStop(0.3, '#ff0055'); g.addColorStop(1, 'transparent');
                    ctx.save(); ctx.shadowBlur = 25; ctx.shadowColor = 'var(--gojo-red)';
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(targetX, targetY, 42, 0, Math.PI * 2); ctx.fill(); ctx.restore();

                    spawnParticle(targetX, targetY, 'red');

                } else if (selectedTechnique === 'purple') {
                    document.getElementById('active-technique').innerText = "HOLLOW: PURPLE";
                    document.getElementById('active-technique').style.color = 'var(--gojo-purple)';

                    let pulseSize = 65 + Math.sin(performance.now() * 0.05) * 8;
                    let g = ctx.createRadialGradient(targetX, targetY, 4, targetX, targetY, pulseSize);
                    g.addColorStop(0, '#fff'); g.addColorStop(0.2, '#cc33ff'); g.addColorStop(0.6, 'rgba(162, 0, 255, 0.5)'); g.addColorStop(1, 'transparent');
                    ctx.save(); ctx.shadowBlur = 45; ctx.shadowColor = 'var(--gojo-purple)';
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(targetX, targetY, pulseSize, 0, Math.PI * 2); ctx.fill(); ctx.restore();

                    for(let k=0; k<4; k++) spawnParticle(targetX, targetY, 'purple');
                }

                // Draw Infinite Cursed Skeleton Wireframes Lines mapping
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.lineWidth = 2;
                results.multiHandLandmarks.forEach(landmarks => {
                    for (let i = 0; i < landmarks.length; i++) {
                        let mx = (1 - landmarks[i].x) * width;
                        let my = landmarks[i].y * height;
                        if (i > 0 && i % 4 !== 1) {
                            ctx.moveTo((1 - landmarks[i-1].x) * width, landmarks[i-1].y * height);
                            ctx.lineTo(mx, my);
                        }
                    }
                });
                ctx.stroke();

            } else {
                document.getElementById('hud-status').innerText = "OFFLINE (NO HANDS)";
                document.getElementById('hud-status').style.color = "red";
                document.getElementById('active-technique').innerText = "Awaiting Gesture";
                document.getElementById('active-technique').style.color = "#fff";
            }

            // Continuous Vector Particles Processing Execution System
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= (p.type === 'blue') ? 0.035 : 0.025;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save(); ctx.globalAlpha = p.alpha;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    if (p.type === 'purple') { ctx.shadowBlur = p.size * 2; ctx.shadowColor = 'var(--gojo-purple)'; }
                    ctx.fill(); ctx.restore();
                }
            }
        }

        // INTELLECTUAL WEBCAM HARNESS ARCHITECTURE
        function initializeMediaPipeEngine() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onTrackingResults);

            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 1280,
                height: 720
            });
            camera.start();
        }
    </script>
</body>
</html>
