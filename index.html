<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Hands AR - Sorcerer Supreme Core</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-dark: #020208;
            --neon-blue: #00d2ff;
            --neon-red: #ff0055;
            --neon-purple: #ba00ff;
            --mystic-gold: #ffaa00;
            --panel-glass: rgba(6, 8, 20, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #cinematic-viewport {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tactical HUD Overlays */
        .hud-container {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 16px;
            pointer-events: none;
        }

        .glass-module {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 20px 26px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6);
            min-width: 280px;
        }

        .module-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 12px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module-header::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hud-row:last-child { margin-bottom: 0; }
        .hud-row .label { color: rgba(255, 255, 255, 0.6); }
        .hud-row .value { font-weight: 700; color: #fff; }

        #sorcery-selector {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 14px;
            padding: 10px;
            border-radius: 50px;
            pointer-events: auto;
        }

        .btn-magic {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.5);
            padding: 12px 26px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-magic.selected {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 8px #fff;
        }

        /* Launcher Portal */
        #gateway-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #070919 0%, #010103 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .core-title {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 9px;
            margin-bottom: 8px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .gateway-btn {
            padding: 20px 56px;
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 35px rgba(0, 210, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .gateway-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 50px rgba(186, 0, 255, 0.5);
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="cinematic-viewport">
        <div id="gateway-screen">
            <h1 class="core-title">CINEMATIC HANDS</h1>
            <p style="color: #4a4d6b; margin-bottom: 45px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;" id="status-text">Quantum Reality Framework Initialization</p>
            <button class="gateway-btn" id="bootBtn">Synchronize Core</button>
        </div>

        <video id="webcam" autoplay playsinline></video>
        <canvas id="renderCanvas"></canvas>

        <div class="hud-container">
            <div class="glass-module">
                <div class="module-header">Engine Metrics</div>
                <div class="hud-row"><span class="label">System Engine</span><span class="value" id="fps-render" style="color: var(--neon-blue);">60 FPS</span></div>
                <div class="hud-row"><span class="label">Spatial Anchors</span><span class="value" id="anchors-count">0 Tracked</span></div>
            </div>
            <div class="glass-module">
                <div class="module-header">Aura Energy Registry</div>
                <div class="hud-row"><span class="label">Reality State</span><span class="value" id="reality-state" style="color: var(--mystic-gold);">Standard Space</span></div>
                <div class="hud-row"><span class="label">Catalyst Mode</span><span class="value" id="active-catalyst">Searching...</span></div>
                <div class="hud-row"><span class="label">Kinetic Velocity</span><span class="value" id="kinetic-velocity">0.0 km/h</span></div>
            </div>
        </div>

        <div id="sorcery-selector" class="glass-module">
            <button class="btn-magic selected" data-class="infinity">LIMITLESS (GOJO)</button>
            <button class="btn-magic" data-class="mystic">MYSTIC ARTS (STRANGE)</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        
        let handLandmarker;
        let runningMode = "VIDEO";
        let lastVideoTime = -1;
        let trackerResults = undefined;
        
        let width, height;
        let frameCount = 0, fps = 0, lastFpsUpdate = performance.now();
        let activeClass = 'infinity';
        let lastHandPoints = [null, null];
        
        let particles = [];
        let orbs = { blue: null, red: null, purple: null };
        let domainState = { active: false, cosmicStars: [] };

        let audioContext, backgroundHum, dynamicGain;

        function handleResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            domainState.cosmicStars = [];
            for(let i=0; i<100; i++) {
                domainState.cosmicStars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.4 + 0.1
                });
            }
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        // Mode Toggler Engine
        document.querySelectorAll('.btn-magic').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-magic').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                activeClass = e.target.getAttribute('data-class');
            });
        });

        // Safe Boot-up Trigger Trigger
        document.getElementById('bootBtn').addEventListener('click', async () => {
            document.getElementById('status-text').innerText = "CONNECTING WEBCAM ENGINE...";
            initAudioEngine();
            await launchMediaPipeCore();
        });

        function initAudioEngine() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                backgroundHum = audioContext.createOscillator();
                dynamicGain = audioContext.createGain();
                
                backgroundHum.type = 'sine';
                backgroundHum.frequency.setValueAtTime(75, audioContext.currentTime);
                dynamicGain.gain.setValueAtTime(0, audioContext.currentTime);

                backgroundHum.connect(dynamicGain);
                dynamicGain.connect(audioContext.destination);
                backgroundHum.start();
            } catch(e) { console.log("Audio block bypass active."); }
        }

        // FAIL-SAFE CAMERA & MODEL INITIALIZATION
        async function launchMediaPipeCore() {
            try {
                // Initialize modern WebAssembly files bundle setup natively
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
                );
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker_full/float16/1/hand_landmarker_full.task`,
                        delegate: "GPU"
                    },
                    runningMode: runningMode,
                    numHands: 2
                });

                // Request user device camera streams layer
                const constraints = { video: { width: 1280, height: 720, facingMode: "user" } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.addEventListener("loadeddata", () => {
                    document.getElementById('gateway-screen').classList.add('hidden');
                    requestAnimationFrame(renderLoop);
                });
            } catch (err) {
                document.getElementById('status-text').innerText = "CAMERA ERROR: Please click Allow Camera Access!";
                alert("Camera connection failed. Please ensure no other application is using your camera and refresh.");
                console.error(err);
            }
        }

        function addParticle(x, y, vx, vy, color, size) {
            particles.push({ x, y, vx, vy, alpha: 1, size, color });
        }

        // SYSTEM PIPELINE RENDERING ARCHITECTURE
        async function renderLoop() {
            let now = performance.now();
            frameCount++;
            if (now >= lastFpsUpdate + 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
                document.getElementById('fps-render').innerText = fps + " FPS";
                frameCount = 0;
                lastFpsUpdate = now;
            }

            // Sync video feed tracking updates frames
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    trackerResults = handLandmarker.predictForVideo(video, now);
                }
            }

            ctx.clearRect(0, 0, width, height);

            // Raw mirror background drawing layout injection 
            ctx.save();
            ctx.translate(width, 0);
            ctx.scale(-1, 1);
            ctx.filter = domainState.active ? "brightness(0.12) contrast(1.4) blur(1px)" : "brightness(0.4) contrast(1.15)";
            ctx.drawImage(video, 0, 0, width, height);
            ctx.restore();

            // Cosmic Domain Fields Layer Processing
            if (domainState.active) {
                document.getElementById('reality-state').innerText = "UNLIMITED VOID";
                document.getElementById('reality-state').style.color = var(--neon-purple);
                
                domainState.cosmicStars.forEach(star => {
                    star.y -= star.speed * 2.5;
                    if(star.y < 0) star.y = height;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r * (1 + Math.sin(now*0.005)), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.7 + 0.3})`;
                    ctx.fill();
                });
            } else {
                document.getElementById('reality-state').innerText = "Standard Space";
                document.getElementById('reality-state').style.color = var(--mystic-gold);
            }

            let trackingHandsCount = trackerResults && trackerResults.landmarks ? trackerResults.landmarks.length : 0;
            document.getElementById('anchors-count').innerText = trackingHandsCount + " Tracked";

            if (trackingHandsCount > 0) {
                if(dynamicGain) dynamicGain.gain.setTargetAtTime(0.1, audioContext.currentTime, 0.1);
                
                let primaryHand = trackerResults.landmarks[0];
                
                // Velocity dynamic evaluation mechanics
                let vFactor = 0;
                if(lastHandPoints[0]) {
                    vFactor = Math.hypot(primaryHand[8].x - lastHandPoints[0].x, primaryHand[8].y - lastHandPoints[0].y) * 200;
                }
                lastHandPoints[0] = primaryHand[8];
                document.getElementById('kinetic-velocity').innerText = vFactor.toFixed(1) + " km/h";

                // Map inside localized coordinate array structures loop 
                trackerResults.landmarks.forEach((landmarks, index) => {
                    let cx = (1 - landmarks[8].x) * width;
                    let cy = landmarks[8].y * height;
                    let wristX = (1 - landmarks[0].x) * width;
                    let wristY = landmarks[0].y * height;

                    let pinchDist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
                    let isPinching = pinchDist < 0.05;
                    let spreadDist = Math.hypot(landmarks[4].x - landmarks[20].x, landmarks[4].y - landmarks[20].y) * 100;

                    // A. INFINITY GOJO LOGIC MODULE MAPPING
                    if (activeClass === 'infinity') {
                        
                        if (trackingHandsCount === 2 && spreadDist > 25 && landmarks[8].y < 0.35) {
                            domainState.active = true;
                        } else if(trackingHandsCount === 0 || spreadDist < 12) {
                            domainState.active = false;
                        }

                        if (isPinching) {
                            if (index === 0) { // Dominant primary hand tracking trigger setup
                                document.getElementById('active-catalyst').innerText = "Lapse: BLUE";
                                orbs.blue = { x: cx, y: cy, r: 24 + Math.sin(now*0.02)*5 };
                                
                                for(let k=0; k<2; k++) {
                                    let theta = Math.random() * Math.PI * 2;
                                    addParticle(cx + Math.cos(theta)*50, cy + Math.sin(theta)*50, -Math.cos(theta)*3, -Math.sin(theta)*3, var(--neon-blue), Math.random()*3+2);
                                }
                            } else {
                                document.getElementById('active-catalyst').innerText = "Reversal: RED";
                                orbs.red = { x: cx, y: cy, r: 20 + Math.sin(now*0.03)*4 };
                                
                                let theta = Math.random() * Math.PI * 2;
                                addParticle(cx, cy, Math.cos(theta)*4, Math.sin(theta)*4, var(--neon-red), Math.random()*3+2);
                            }
                        } else {
                            if(index === 0) orbs.blue = null;
                            if(index === 1) orbs.red = null;
                        }

                        // HOLLOW PURPLE ULTIMATE COLLISION EXECUTION CHECKS
                        if (trackingHandsCount === 2 && orbs.blue && orbs.red) {
                            let gap = Math.hypot(orbs.blue.x - orbs.red.x, orbs.blue.y - orbs.red.y);
                            if (gap < 150) {
                                document.getElementById('active-catalyst').innerText = "HOLLOW PURPLE";
                                let midX = (orbs.blue.x + orbs.red.x) / 2;
                                let midY = (orbs.blue.y + orbs.red.y) / 2;
                                orbs.purple = { x: midX, y: midY, r: 55 + Math.sin(now*0.05)*10 };
                                
                                for(let m=0; m<5; m++) {
                                    let ang = Math.random() * Math.PI*2;
                                    addParticle(midX, midY, Math.cos(ang)*5, Math.sin(ang)*5, var(--neon-purple), Math.random()*5+3);
                                }
                                orbs.blue = null; orbs.red = null;
                            } else { orbs.purple = null; }
                        } else { orbs.purple = null; }

                        // Draw Orbs Elements
                        if(orbs.blue) {
                            ctx.beginPath();
                            ctx.arc(orbs.blue.x, orbs.blue.y, orbs.blue.r, 0, Math.PI*2);
                            ctx.fillStyle = var(--neon-blue);
                            ctx.shadowBlur = 25; ctx.shadowColor = var(--neon-blue);
                            ctx.fill(); ctx.shadowBlur = 0;
                        }
                        if(orbs.red) {
                            ctx.beginPath();
                            ctx.arc(orbs.red.x, orbs.red.y, orbs.red.r, 0, Math.PI*2);
                            ctx.fillStyle = var(--neon-red);
                            ctx.shadowBlur = 25; ctx.shadowColor = var(--neon-red);
                            ctx.fill(); ctx.shadowBlur = 0;
                        }
                        if(orbs.purple) {
                            ctx.beginPath();
                            ctx.arc(orbs.purple.x, orbs.purple.y, orbs.purple.r, 0, Math.PI*2);
                            ctx.fillStyle = var(--neon-purple);
                            ctx.shadowBlur = 50; ctx.shadowColor = var(--neon-purple);
                            ctx.fill(); ctx.shadowBlur = 0;
                        }

                        // Skeleton wireframe trace paths
                        ctx.beginPath();
                        ctx.strokeStyle = domainState.active ? var(--neon-purple) : "rgba(255,255,255,0.3)";
                        ctx.lineWidth = 2;
                        for(let i=0; i<landmarks.length; i++) {
                            let mx = (1 - landmarks[i].x) * width;
                            let my = landmarks[i].y * height;
                            if(i > 0 && i % 4 !== 1) {
                                ctx.moveTo((1 - landmarks[i-1].x) * width, landmarks[i-1].y * height);
                                ctx.lineTo(mx, my);
                            }
                        }
                        ctx.stroke();

                    // B. DOCTOR STRANGE MYSTIC ARTS ENGINE
                    } else if (activeClass === 'mystic') {
                        document.getElementById('active-catalyst').innerText = "Eldritch Shield";
                        
                        ctx.save();
                        ctx.translate(wristX, wristY);
                        ctx.rotate(now * 0.0015);
                        ctx.strokeStyle = var(--mystic-gold);
                        ctx.shadowBlur = 20; ctx.shadowColor = var(--mystic-gold);
                        ctx.lineWidth = 2;
                        
                        // Outer Mystic Geometry Ring Drawing
                        ctx.beginPath(); ctx.arc(0, 0, 70, 0, Math.PI * 2); ctx.stroke();
                        
                        // Hexagon interior mapping array structure execution
                        ctx.beginPath();
                        for (let m = 0; m < 6; m++) {
                            let rad = (Math.PI / 3) * m;
                            let nRad = (Math.PI / 3) * (m + 2);
                            ctx.moveTo(Math.cos(rad) * 70, Math.sin(rad) * 70);
                            ctx.lineTo(Math.cos(nRad) * 70, Math.sin(nRad) * 70);
                        }
                        ctx.stroke();
                        ctx.restore();
                        ctx.shadowBlur = 0;

                        // Emit magical continuous sparkles at fingertips lines loop
                        if(Math.random() > 0.4) {
                            addParticle(cx, cy, (Math.random()-0.5)*2, (Math.random()-0.5)*2, var(--mystic-gold), Math.random()*3+1);
                        }
                    }
                });
            } else {
                if(dynamicGain) dynamicGain.gain.setTargetAtTime(0, audioContext.currentTime, 0.1);
                document.getElementById('kinetic-velocity').innerText = "0.0 km/h";
                document.getElementById('active-catalyst').innerText = "Searching...";
                domainState.active = false;
            }

            // Particle System Vector Array rendering engine update block
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= 0.025;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            requestAnimationFrame(renderLoop);
        }
    </script>
</body>
</html>
