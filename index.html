<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Hands AR - Absolute Tracking Core</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --bg-dark: #020206;
            --neon-blue: #00d2ff;
            --neon-red: #ff0055;
            --neon-purple: #ba00ff;
            --mystic-gold: #ffaa00;
            --panel-glass: rgba(8, 10, 25, 0.8);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #cinematic-viewport {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }

        /* Quantum HUD Overlays */
        .hud-container {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 14px;
            pointer-events: none;
        }

        .glass-module {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 18px 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            min-width: 280px;
        }

        .module-header {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .module-header::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--neon-blue);
            border-radius: 50%;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hud-row:last-child { margin-bottom: 0; }
        .hud-row .label { color: rgba(255, 255, 255, 0.5); }
        .hud-row .value { font-weight: 700; color: #fff; }

        #sorcery-selector {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
            padding: 8px;
            border-radius: 50px;
            pointer-events: auto;
        }

        .btn-magic {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.5);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-magic.selected {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 8px #fff;
        }

        /* Portal Entrance */
        #gateway-screen {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #070919 0%, #010103 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .core-title {
            font-size: 2.4rem;
            font-weight: 200;
            letter-spacing: 9px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .gateway-btn {
            padding: 20px 56px;
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 35px rgba(0, 210, 255, 0.3);
        }

        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="cinematic-viewport">
        <div id="gateway-screen">
            <h1 class="core-title">CINEMATIC HANDS</h1>
            <p style="color: #4a4d6b; margin-bottom: 45px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;">Tracking Engine Verification</p>
            <button class="gateway-btn" id="bootBtn">Synchronize Core</button>
        </div>

        <video id="webcam" autoplay playsinline></video>
        <canvas id="renderCanvas"></canvas>

        <div class="hud-container">
            <div class="glass-module">
                <div class="module-header">Tracking Metrics</div>
                <div class="hud-row"><span class="label">Render Engine</span><span class="value" style="color: var(--neon-blue);">60 FPS</span></div>
                <div class="hud-row"><span class="label">Active Hands</span><span class="value" id="hud-hands">0 Detected</span></div>
            </div>
            <div class="glass-module">
                <div class="module-header">Energy Signature</div>
                <div class="hud-row"><span class="label">Reality State</span><span class="value" id="reality-state" style="color: var(--mystic-gold);">Standard Space</span></div>
                <div class="hud-row"><span class="label">Cursed Energy</span><span class="value" id="active-catalyst">Searching Identity</span></div>
                <div class="hud-row"><span class="label">Spread Space</span><span class="value" id="hud-spread">0%</span></div>
            </div>
        </div>

        <div id="sorcery-selector" class="glass-module">
            <button class="btn-magic selected" data-class="infinity">LIMITLESS (GOJO)</button>
            <button class="btn-magic" data-class="mystic">MYSTIC ARTS (STRANGE)</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let activeClass = 'infinity';
        let particles = [];
        let domainActive = false;
        
        // Tracking Orbs State Management
        let blueOrb = null, redOrb = null, purpleOrb = null;

        function handleResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', handleResize);
        handleResize();

        // Archetype Selector Control
        document.querySelectorAll('.btn-magic').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.btn-magic').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                activeClass = e.target.getAttribute('data-class');
            });
        });

        // Initialize Core Click Pipeline
        document.getElementById('bootBtn').addEventListener('click', () => {
            document.getElementById('gateway-screen').classList.add('hidden');
            startTrackingEngine();
        });

        function addParticle(x, y, color) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 1,
                alpha: 1,
                size: Math.random() * 4 + 2,
                color: color
            });
        }

        // MEDIAPIPE DEEP RENDER AND ANALYSIS FRAME ENGINE
        function onResults(results) {
            ctx.clearRect(0, 0, width, height);

            // Draw Webcam Horizontal Mirror Viewport
            ctx.save();
            ctx.translate(width, 0);
            ctx.scale(-1, 1);
            ctx.filter = domainActive ? "brightness(0.15) contrast(1.4) blur(1px)" : "brightness(0.4) contrast(1.15)";
            ctx.drawImage(results.image, 0, 0, width, height);
            ctx.restore();

            // Cosmic Domain Fields Simulation Layer
            if (domainActive && activeClass === 'infinity') {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                for (let i = 0; i < 15; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            let totalHands = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
            document.getElementById('hud-hands').innerText = `${totalHands}/2 Active`;

            if (totalHands > 0) {
                // Read Hand Attributes
                let primaryHand = results.multiHandLandmarks[0];
                let thumbTip = primaryHand[4];
                let indexTip = primaryHand[8];
                let pinkyTip = primaryHand[20];
                
                // Real-time geometric calculation functions
                let spreadDist = Math.hypot(thumbTip.x - pinkyTip.x, thumbTip.y - pinkyTip.y);
                let spreadPercent = Math.min(Math.round(spreadDist * 250), 100);
                document.getElementById('hud-spread').innerText = spreadPercent + "%";

                // Map landmarks coordinates structure loops
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    let handLabel = results.multiHandedness[index].label; // Left or Right evaluation
                    
                    // Spatial Conversion (Factoring Canvas Size Dimensions)
                    let hx = (1 - landmarks[8].x) * width;
                    let hy = landmarks[8].y * height;
                    let wristX = (1 - landmarks[0].x) * width;
                    let wristY = landmarks[0].y * height;

                    let pinchDist = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
                    let isPinching = pinchDist < 0.05;

                    // ----------------------------------------
                    // PIPELINE 1: LIMITLESS (GOJO) VISUAL EFFECTS
                    // ----------------------------------------
                    if (activeClass === 'infinity') {
                        
                        // Domain Expansion Trigger Condition: (Spread over 80% and elevated hands position)
                        if (totalHands === 2 && spreadPercent > 80 && landmarks[8].y < 0.35) {
                            domainActive = true;
                            document.getElementById('reality-state').innerText = "UNLIMITED VOID";
                            document.getElementById('reality-state').style.color = 'var(--neon-purple)';
                        } else if (totalHands === 0 || spreadPercent < 20) {
                            domainActive = false;
                            document.getElementById('reality-state').innerText = "Standard Space";
                            document.getElementById('reality-state').style.color = 'var(--mystic-gold)';
                        }

                        if (isPinching) {
                            if (handLabel === 'Left') {
                                document.getElementById('active-catalyst').innerText = "Lapse: BLUE";
                                blueOrb = { x: hx, y: hy, r: 28 + Math.sin(performance.now()*0.02)*6 };
                                if (Math.random() > 0.3) addParticle(hx, hy, 'var(--neon-blue)');
                            } else {
                                document.getElementById('active-catalyst').innerText = "Reversal: RED";
                                redOrb = { x: hx, y: hy, r: 24 + Math.sin(performance.now()*0.03)*4 };
                                if (Math.random() > 0.3) addParticle(hx, hy, 'var(--neon-red)');
                            }
                        } else {
                            if (handLabel === 'Left') blueOrb = null;
                            if (handLabel === 'Right') redOrb = null;
                        }

                        // HOLLOW PURPLE FUSION CALCULATOR MECHANISM
                        if (totalHands === 2 && blueOrb && redOrb) {
                            let distanceBetweenOrbs = Math.hypot(blueOrb.x - redOrb.x, blueOrb.y - redOrb.y);
                            if (distanceBetweenOrbs < 140) {
                                document.getElementById('active-catalyst').innerText = "HOLLOW PURPLE";
                                let midX = (blueOrb.x + redOrb.x) / 2;
                                let midY = (blueOrb.y + redOrb.y) / 2;
                                purpleOrb = { x: midX, y: midY, r: 60 + Math.sin(performance.now()*0.05)*10 };
                                
                                for(let m=0; m<4; m++) {
                                    addParticle(midX, midY, 'var(--neon-purple)');
                                }
                                blueOrb = null; redOrb = null;
                            } else { purpleOrb = null; }
                        } else { purpleOrb = null; }

                        // Triggering Orbs Processing Loops
                        if(blueOrb) {
                            ctx.beginPath(); ctx.arc(blueOrb.x, blueOrb.y, blueOrb.r, 0, Math.PI*2);
                            ctx.fillStyle = 'var(--neon-blue)'; ctx.shadowBlur = 30; ctx.shadowColor = 'var(--neon-blue)';
                            ctx.fill(); ctx.shadowBlur = 0;
                        }
                        if(redOrb) {
                            ctx.beginPath(); ctx.arc(redOrb.x, redOrb.y, redOrb.r, 0, Math.PI*2);
                            ctx.fillStyle = 'var(--neon-red)'; ctx.shadowBlur = 30; ctx.shadowColor = 'var(--neon-red)';
                            ctx.fill(); ctx.shadowBlur = 0;
                        }
                        if(purpleOrb) {
                            ctx.beginPath(); ctx.arc(purpleOrb.x, purpleOrb.y, purpleOrb.r, 0, Math.PI*2);
                            ctx.fillStyle = 'var(--neon-purple)'; ctx.shadowBlur = 55; ctx.shadowColor = 'var(--neon-purple)';
                            ctx.fill(); ctx.shadowBlur = 0;
                        }

                        // Render Structural Wireframe Skeleton lines
                        ctx.beginPath();
                        ctx.strokeStyle = domainActive ? 'var(--neon-purple)' : 'rgba(255,255,255,0.35)';
                        ctx.lineWidth = 2.5;
                        for(let i=0; i<landmarks.length; i++) {
                            let mx = (1 - landmarks[i].x) * width;
                            let my = landmarks[i].y * height;
                            if(i > 0 && i % 4 !== 1) {
                                ctx.moveTo((1 - landmarks[i-1].x) * width, landmarks[i-1].y * height);
                                ctx.lineTo(mx, my);
                            }
                        }
                        ctx.stroke();

                    // ----------------------------------------
                    // PIPELINE 2: MYSTIC ARTS (STRANGE) VISUAL EFFECTS
                    // ----------------------------------------
                    } else if (activeClass === 'mystic') {
                        document.getElementById('active-catalyst').innerText = "Eldritch Shield";
                        
                        ctx.save();
                        ctx.translate(wristX, wristY);
                        ctx.rotate(performance.now() * 0.002);
                        ctx.strokeStyle = 'var(--mystic-gold)';
                        ctx.lineWidth = 2.5;
                        ctx.shadowBlur = 20; ctx.shadowColor = 'var(--mystic-gold)';
                        
                        // Geometric Sacred Mandala Array Generator
                        ctx.beginPath(); ctx.arc(0, 0, 65, 0, Math.PI * 2); ctx.stroke();
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            let r = (Math.PI / 3) * i;
                            ctx.lineTo(Math.cos(r) * 65, Math.sin(r) * 65);
                        }
                        ctx.closePath(); ctx.stroke();
                        ctx.restore(); ctx.shadowBlur = 0;

                        if (Math.random() > 0.4) addParticle(hx, hy, 'var(--mystic-gold)');
                    }
                });

            } else {
                blueOrb = null; redOrb = null; purpleOrb = null;
                document.getElementById('active-catalyst').innerText = "Searching Identity";
            }

            // Independent Vector Particles Renderer Processor
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= 0.03;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color; ctx.fill();
                    ctx.restore();
                }
            }
        }

        // ENGINE INGESTION AND LAUNCH PIPELINE
        function startTrackingEngine() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.55,
                minTrackingConfidence: 0.55
            });

            hands.onResults(onResults);

            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 1280,
                height: 720
            });
            camera.start();
        }
    </script>
</body>
</html>
